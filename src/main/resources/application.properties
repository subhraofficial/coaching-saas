spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=604800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8081}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.otp.expiry-minutes=5
app.otp.cooldown-seconds=30

razorpay.key_id=${RAZORPAY_KEY_ID:YOUR_KEY_ID}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:YOUR_KEY_SECRET}
razorpay.webhook_secret=${RAZORPAY_WEBHOOK_SECRET:TEMP_SECRET}
razorpay.pro_plan_id=${RAZORPAY_PRO_PLAN_ID:plan_xxxxxxxxxxxxx}
razorpay.pro_monthly_amount_inr=${RAZORPAY_PRO_MONTHLY_AMOUNT_INR:299}