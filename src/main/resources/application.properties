spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=604800000
server.port=${PORT:8081}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.otp.expiry-minutes=5
app.otp.cooldown-seconds=30

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.main.banner-mode=off
server.tomcat.threads.max=50
spring.main.lazy-initialization=true

razorpay.key_id=${RAZORPAY_KEY_ID:YOUR_KEY_ID}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:YOUR_KEY_SECRET}
razorpay.webhook_secret=${RAZORPAY_WEBHOOK_SECRET:TEMP_SECRET}
razorpay.pro_plan_id=${RAZORPAY_PRO_PLAN_ID:plan_xxxxxxxxxxxxx}
razorpay.pro_monthly_amount_inr=${RAZORPAY_PRO_MONTHLY_AMOUNT_INR:299}